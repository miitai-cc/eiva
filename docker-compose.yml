# Eiva Docker Compose
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop and remove containers
#
# Configuration:
#   Mount your config.toml at /home/eiva/.config/eiva/config.toml
#   or set environment variables for provider keys.

services:
  eiva:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eiva
    restart: unless-stopped
    ports:
      # - "3000:3000"   # SSH transport
      - "39999:39999" # HTTP API (health, tasks, static files)
    volumes:
      - eiva-data:/home/eiva/.config/eiva  # settings / config / workspace root
      - ./vol/skills:/home/eiva/.config/eiva/workspace/skills
      - ./vol/prompts:/home/eiva/.config/eiva/workspace/prompts
      - ./vol/files:/home/eiva/.config/eiva/workspace/files
      - ./vol/assets:/home/eiva/assets                   # served by Salvo API
    environment:
      - RUSTYCLAW_LOG=eiva=info
      # Provider API keys (set in .env or pass via environment):
      # - OPENAI_API_KEY=
      # - ANTHROPIC_API_KEY=
      # - GOOGLE_API_KEY=
      # Messenger tokens:
      # - DISCORD_BOT_TOKEN=
      # - TELEGRAM_BOT_TOKEN=
      # - SLACK_BOT_TOKEN=
    command: ["run", "--ssh-listen", "0.0.0.0:3000"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:39999/eiva/backend/api/ver-0.95/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  eiva-data:
