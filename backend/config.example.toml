# RustyClaw Configuration Example
# Copy this to ~/.rustyclaw/config.toml and customize

# Directory for RustyClaw settings and data
settings_dir = "/home/user/.rustyclaw"

# Path to SOUL.md file (optional)
# soul_path = "/home/user/.rustyclaw/SOUL.md"

# Directory containing skills (optional)
# skills_dir = "/home/user/.rustyclaw/skills"

# Whether to use the secrets storage system
use_secrets = true

# Blank lines between messages in the TUI (0 = compact, 1 = comfortable)
# message_spacing = 1

# TLS configuration for WSS (WebSocket Secure) gateway connections.
# Both tls_cert and tls_key must be set to enable WSS.
# tls_cert = "/path/to/cert.pem"
# tls_key = "/path/to/key.pem"

# SSH transport configuration for the gateway.
# Allows clients to connect via SSH instead of WebSocket.
# [ssh]
# enabled = true
# mode = "standalone"                              # "standalone" or "subsystem"
# bind = "0.0.0.0:2222"                            # Listen address for standalone mode
# host_key = "/home/user/.rustyclaw/ssh_host_key"  # Auto-generated if missing
# authorized_keys = "/home/user/.rustyclaw/authorized_clients"

# Selected model provider and default model
# [model]
# provider = "anthropic"
# model = "claude-sonnet-4-20250514"

# ── Custom model providers ────────────────────────────────────────────────
# Register your own providers (self-hosted / local OpenAI-compatible servers,
# alternative API gateways, …). They appear in every provider menu alongside
# the built-ins and can be managed from the TUI with:
#   /provider add <id> <base_url> [format=…] [key=…] [models=…] [name=…]
#   /provider remove <id>
#   /provider list
#
# [[custom_providers]]
# id = "my-vllm"                                # lowercase letters/digits/-/_
# display_name = "vLLM on the GPU box"          # optional, defaults to id
# base_url = "http://192.168.1.50:8000/v1"
# api_format = "openai"                         # openai | anthropic | gemini | xai
# api_key_secret = "MY_VLLM_API_KEY"            # optional; vault secret or env var
# models = ["qwen3-coder-30b", "llama-3.3-70b"] # optional; /v1/models is also queried

# ── Local inference engines ───────────────────────────────────────────────
# Engines are managed from the TUI /engines panel (install/start/stop/pull).
# Joshua (https://github.com/rexlunae/joshua) is a pure-Rust GGUF server:
# one process serves one model, picked from models_dir at startup.
#
# [engines.joshua]
# enabled = true
# port = 8331                                   # RustyClaw's default for joshua
# models_dir = "/home/user/.rustyclaw/models/joshua"
# default_model = "qwen3-4b-Q4_K_M"             # GGUF file stem to serve
# auto_start = true                             # start with the gateway
#
# [engines.ollama]
# enabled = true
# auto_start = false

# Messenger configurations
# [[messengers]]
# name = "slack"
# enabled = false
# config_path = "/home/user/.rustyclaw/messengers/slack.toml"

# [[messengers]]
# name = "discord"
# enabled = false
# config_path = "/home/user/.rustyclaw/messengers/discord.toml"
