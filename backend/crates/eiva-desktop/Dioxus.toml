[application]
name = "Eiva"

# App icons rendered from the project logo (../../logo.svg) by build.rs on
# every build — the icons/ directory is generated, not committed.
[bundle]
identifier = "io.eiva.desktop"
icon = [
    "icons/32x32.png",
    "icons/128x128.png",
    "icons/128x128@2x.png",
    "icons/icon.icns",
    "icons/icon.ico",
]
